<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Star Flow Command — 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      touch-action: none;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      color: #4488ff;
      font-family: Arial, sans-serif;
      font-size: 24px;
      z-index: 200;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #instructions {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: Arial, sans-serif;
      font-size: 11px;
      text-align: center;
      pointer-events: none;
      z-index: 50;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Star Flow Command...</div>
  <canvas id="game-canvas"></canvas>
  <div id="instructions">
    Click planet to select &bull; Click target to create route &bull; Click source again to disconnect &bull; Drag to rotate &bull; Shift+Drag to pan &bull; Scroll to zoom &bull; Power &gt;15 = 2 routes, &gt;30 = 3 routes
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loading')?.classList.add('hidden'), 500);
    });
  </script>
</body>
</html>
